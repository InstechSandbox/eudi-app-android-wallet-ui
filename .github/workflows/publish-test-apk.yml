name: Publish Test APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag and release identifier for the APK publication.
        required: true
        type: string
      release_name:
        description: Human-readable release title.
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out wallet repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out project docs
        uses: actions/checkout@v4
        with:
          repository: InstechSandbox/project-docs
          path: project-docs
          token: ${{ secrets.PROJECT_DOCS_REPO_TOKEN || github.token }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Restore Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          [[ -n "$ANDROID_KEY_ALIAS" ]]
          [[ -n "$ANDROID_KEY_PASSWORD" ]]
          [[ -n "$ANDROID_KEYSTORE_BASE64" ]]
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > sign

      - name: Build demo release APK
        run: ./gradlew -x workspaceClean :app:assembleDemoRelease --console=plain

      - name: Generate Android compliance bundle
        env:
          CODE_ROOT: ${{ github.workspace }}
          WALLET_REPO: ${{ github.workspace }}
        run: |
          bash project-docs/scripts/generate-mobile-compliance-bundle.sh android "${{ inputs.release_tag }}"

      - name: Archive compliance bundle
        run: |
          bundle_dir="project-docs/.local/mobile-compliance/${{ inputs.release_tag }}-android"
          cd project-docs/.local/mobile-compliance
          zip -r "${{ inputs.release_tag }}-android-compliance.zip" "${{ inputs.release_tag }}-android"
          cd - >/dev/null
          echo "COMPLIANCE_ZIP=project-docs/.local/mobile-compliance/${{ inputs.release_tag }}-android-compliance.zip" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            app/build/outputs/apk/demo/release/*.apk
            ${{ env.COMPLIANCE_ZIP }}