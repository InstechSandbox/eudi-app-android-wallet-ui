name: Publish Test APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Git tag and release identifier for the APK publication.
        required: true
        type: string
      release_name:
        description: Human-readable release title.
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out wallet repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Restore Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          [[ -n "$ANDROID_KEY_ALIAS" ]]
          [[ -n "$ANDROID_KEY_PASSWORD" ]]
          [[ -n "$ANDROID_KEYSTORE_BASE64" ]]
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > sign

      - name: Build demo release APK
        run: ./gradlew -x workspaceClean :app:assembleDemoRelease --console=plain

      - name: Generate Android compliance bundle
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          bundle_dir=".local/mobile-compliance/${RELEASE_TAG}-android"
          mkdir -p "$bundle_dir"

          cp LICENSE.txt "$bundle_dir/LICENSE.txt"
          cp NOTICE.txt "$bundle_dir/NOTICE.txt"
          cp gradle/libs.versions.toml "$bundle_dir/libs.versions.toml"

          git remote get-url origin > "$bundle_dir/source-repository.txt"
          git rev-parse HEAD > "$bundle_dir/source-commit.txt"

          cat > "$bundle_dir/release-record.md" <<EOF
          # Android Release Record

          - Release tag: ${RELEASE_TAG}
          - Release name: ${{ inputs.release_name || inputs.release_tag }}
          - Repository: $(git remote get-url origin)
          - Commit: $(git rev-parse HEAD)
          - Build date: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          - Distribution status: proof-of-concept tester prerelease

          ## Included notices

          - LICENSE.txt
          - NOTICE.txt
          - gradle/libs.versions.toml

          ## Notes

          This sidecar is generated directly from the Android wallet repository so the tester APK release remains self-contained even when cross-repository compliance helpers are unavailable in GitHub Actions.
          EOF

      - name: Archive compliance bundle
        run: |
          bundle_dir=".local/mobile-compliance/${{ inputs.release_tag }}-android"
          cd .local/mobile-compliance
          zip -r "${{ inputs.release_tag }}-android-compliance.zip" "${{ inputs.release_tag }}-android"
          cd - >/dev/null
          echo "COMPLIANCE_ZIP=.local/mobile-compliance/${{ inputs.release_tag }}-android-compliance.zip" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            app/build/outputs/apk/demo/release/*.apk
            ${{ env.COMPLIANCE_ZIP }}